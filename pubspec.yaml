name: kpi_kanban_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_boardview:
    path: packages/flutter_boardview
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  go_router: ^17.2.1
  retrofit: ^4.9.2
  json_annotation: ^4.9.0
  dio: ^5.8.0+1
  get_it: ^8.0.3
  injectable: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  freezed: ^3.2.5
  retrofit_generator: ^10.2.5
  json_serializable: ^6.13.1
  build_runner: ^2.13.1
  injectable_generator: ^2.7.0

flutter:
  generate: true
  uses-material-design: true
  
  assets:
  - assets/
  - assets/fonts/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
        - asset: assets/fonts/Nunito-Italic-VariableFont_wght.ttf
          style: italic
